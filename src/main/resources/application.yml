spring:
  application:
    name: task-manager-api

  # ========================
  # DATABASE (PostgreSQL)
  # ========================
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskmanager}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ========================
# JWT CONFIG
# ========================
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm12345}
  expiration: 86400000  # 24 hours in ms

# ========================
# AWS S3 CONFIG
# ========================
aws:
  s3:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    bucket-name: ${AWS_BUCKET_NAME:task-manager-uploads}
    region: ${AWS_REGION:ap-south-1}

# ========================
# SWAGGER
# ========================
springdoc:
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ========================
# SERVER
# ========================
server:
  port: ${PORT:8080}
